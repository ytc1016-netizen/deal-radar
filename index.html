<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成交雷達 Sales Closing Radar</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
    background: #f5f6f8;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 480px;
    margin: auto;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

.subtitle {
    color: #666;
    margin-top: 5px;
    font-size: 14px;
}

.question {
    font-size: 16px;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    background: #eee;
}

button.active {
    background: #1F7A63;
    color: white;
}

.next {
    background: black;
    color: white;
}

.result {
    text-align: center;
}

.percent {
    font-size: 48px;
    font-weight: bold;
    margin: 10px 0;
}

.high { background: #1F7A63; color: white; }
.mid { background: #C9A96E; color: white; }
.low { background: #8B2E2E; color: white; }

.advice {
    margin-top: 15px;
    font-size: 15px;
    line-height: 1.6;
}

.footer {
    font-size: 12px;
    color: #aaa;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<!-- 首頁 -->
<div id="start" class="card">
    <div class="title">成交機率分析工具</div>
    <div class="subtitle">Sales Closing Radar</div>
    <div class="subtitle">用結構化問題，快速判斷這單該追還是該放</div>

    <button onclick="startTest()">開始分析</button>
</div>

<!-- 問題 -->
<div id="quiz" class="card" style="display:none;">
    <div class="question" id="questionText"></div>
    <div id="options"></div>
    <button class="next" onclick="nextQuestion()">下一題</button>
</div>

<!-- 結果 -->
<div id="result" class="card result" style="display:none;">
    <div class="title">分析結果</div>
    <div class="percent" id="percent"></div>
    <div id="level"></div>
    <div class="advice" id="advice"></div>
    <div class="footer">※ 本分析依據客戶行為與成交模型推估</div>
</div>

</div>

<script>
const questions = [
    { q: "客戶是否已看過3間以上物件？", score: 20 },
    { q: "是否明確表達購買意願？", score: 25 },
    { q: "是否已談到價格或條件？", score: 20 },
    { q: "是否有明確購買時間？", score: 20 },
    { q: "是否有決策權或關鍵影響力？", score: 15 }
];

let current = 0;
let totalScore = 0;

function startTest() {
    document.getElementById("start").style.display = "none";
    document.getElementById("quiz").style.display = "block";
    loadQuestion();
}

function loadQuestion() {
    document.getElementById("questionText").innerText = questions[current].q;
    let options = document.getElementById("options");
    options.innerHTML = "";

    ["是", "不確定", "否"].forEach((text, index) => {
        let btn = document.createElement("button");
        btn.innerText = text;
        btn.onclick = () => selectOption(index, btn);
        options.appendChild(btn);
    });
}

let selected = null;

function selectOption(index, btn) {
    selected = index;
    document.querySelectorAll("#options button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function nextQuestion() {
    if (selected === null) {
        alert("請選擇答案");
        return;
    }

    let scoreMap = [1, 0.5, 0];
    totalScore += questions[current].score * scoreMap[selected];

    current++;
    selected = null;

    if (current < questions.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById("quiz").style.display = "none";
    document.getElementById("result").style.display = "block";

    let percent = Math.round(totalScore);
    document.getElementById("percent").innerText = percent + "%";

    let level = document.getElementById("level");
    let advice = document.getElementById("advice");
    let resultCard = document.getElementById("result");

    if (percent >= 70) {
        resultCard.classList.add("high");
        level.innerText = "高度成交機會｜建議積極推進";
        advice.innerText = "客戶具備明確購買訊號，建議加快成交節奏，避免流失。";
    } else if (percent >= 40) {
        resultCard.classList.add("mid");
        level.innerText = "尚未明確｜建議持續觀察";
        advice.innerText = "客戶仍在評估階段，需加強信任與需求確認。";
    } else {
        resultCard.classList.add("low");
        level.innerText = "成交可能性低｜建議暫停投入";
        advice.innerText = "缺乏關鍵成交訊號，建議降低優先順序。";
    }
}
</script>

</body>
</html>
