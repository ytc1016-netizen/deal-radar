<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成交雷達</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  margin: 0;
  background: linear-gradient(180deg, #0f172a, #1e293b);
  color: #e2e8f0;
  text-align: center;
}

h2 {
  margin-top: 20px;
  font-weight: 700;
  color: #fbbf24;
  letter-spacing: 2px;
}

/* 按鈕 */
button {
  width: 90%;
  padding: 16px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: black;
}

/* 卡片 */
.result-card {
  border-radius: 22px;
  padding: 25px;
  margin: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

/* 分數 */
.score-big {
  font-size: 48px;
  font-weight: bold;
}

/* 建議 */
.advice-text {
  font-size: 18px;
  margin-top: 10px;
}

/* 籤 */
.top-tag {
  font-size: 14px;
  margin-bottom: 10px;
}

/* 解鎖 */
.lock-box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
  background: rgba(0,0,0,0.3);
}

/* 顏色 */
.result-good {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: white;
}

.result-mid {
  background: linear-gradient(135deg, #facc15, #fbbf24);
  color: black;
}

.result-bad {
  background: linear-gradient(135deg, #dc2626, #ef4444);
  color: white;
}
</style>

</head>

<body>

<h2>成交雷達</h2>

<div id="step1">
<p>客戶狀態？</p>
<button onclick="selectClient('熱')">很有興趣</button>
<button onclick="selectClient('普通')">普通</button>
<button onclick="selectClient('冷')">冷</button>
</div>

<div id="step2" style="display:none;">
<p>目前進度？</p>
<button onclick="calc('成交')">準備成交</button>
<button onclick="calc('議價')">談價中</button>
<button onclick="calc('初談')">剛開始</button>
<button onclick="goBack1()">← 返回</button>
</div>

<div id="result" style="display:none;">

  <div id="resultBox" class="result-card">

    <div class="top-tag">AI 判斷結果</div>

    <div id="score" class="score-big"></div>

    <div id="advice" class="advice-text"></div>

    <div id="lock" class="lock-box">
🔒 完整成交策略 NT$49<br><br>
💰 這一步，可能就是成交關鍵
    </div>

    <button onclick="unlock()">🔓 解鎖完整分析</button>
    <button onclick="printReport()">📄 列印 / 收藏</button>
    <button onclick="resetAll()">重新開始</button>

  </div>

</div>

<script>

let client="";

function selectClient(c){
  client=c;
  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";
}

function goBack1(){
  document.getElementById("step2").style.display="none";
  document.getElementById("step1").style.display="block";
}

function resetAll(){
  document.getElementById("result").style.display="none";
  document.getElementById("step1").style.display="block";
}

function calc(stage){

  let score=50;

  if(client==="熱") score+=20;
  if(client==="冷") score-=20;

  if(stage==="成交") score+=15;
  if(stage==="初談") score-=10;

  score=Math.max(0,Math.min(100,score));

  let advice="";
  let tag = document.querySelector(".top-tag");
  let box = document.getElementById("resultBox");

  box.className = "result-card";

  if(score >= 70){
    advice="🟢 可推進（時機不錯）";
    tag.innerText = "🟢 上上籤";
    box.classList.add("result-good");

  }else if(score >= 40){
    advice="⚠️ 建議觀察（先不要急）";
    tag.innerText = "🟡 中籤";
    box.classList.add("result-mid");

  }else{
    advice="🔴 風險偏高（暫停推進）";
    tag.innerText = "🔴 下籤";
    box.classList.add("result-bad");
  }

  document.getElementById("score").innerText="成交機率："+score+"%";
  document.getElementById("advice").innerText=advice;

  document.getElementById("step2").style.display="none";
  document.getElementById("result").style.display="block";
}

function unlock(){

  let confirmPay = confirm("這功能之後會收費 NT$49\n你會願意付嗎？");

  if(confirmPay){
    alert("🙏 測試中，先免費開放");

    document.getElementById("lock").innerHTML =
    "✅ 話術：先確認需求再談價格<br><br>" +
    "⏰ 時機：下午3-5點<br><br>" +
    "🧠 心理：對方接近決策點";

  }else{
    document.getElementById("lock").innerHTML =
    "👉 建議：目前可推進，但避免談價格";
  }
}

function printReport(){

  const score = document.getElementById("score").innerText;
  const advice = document.getElementById("advice").innerText;

  const now = new Date();
  const time = now.toLocaleString();

  const html = `
  <h1>成交決策報告</h1>
  <p>${score}</p>
  <p>${advice}</p>
  <p>時間：${time}</p>
  `;

  const w = window.open("");
  w.document.write(html);
  w.print();
}

</script>

</body>
</html>
